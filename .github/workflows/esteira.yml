name: Esteira SDD — Python + IA

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/ --strict

      - name: SAST (bandit)
        run: bandit -r src/ -ll

      - name: Unit tests
        run: python -m pytest tests/unit/ -v

      - name: Integration tests
        run: python -m pytest tests/integration/ -v
        continue-on-error: false

      - name: Acceptance tests
        run: python -m pytest tests/acceptance/ -v

      - name: Coverage (mínimo 80%)
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sdd-conformance:
    name: Conformidade SDD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar specs existentes
        run: |
          python - << 'EOF'
          import os, sys, re
          specs_dir = "specs"
          violations = []
          if not os.path.isdir(specs_dir):
              print("specs/ não encontrado — ok para projeto novo")
              sys.exit(0)
          for entry in os.scandir(specs_dir):
              if not entry.is_dir() or entry.name.startswith("_") or entry.name == "quick":
                  continue
              spec_file = os.path.join(entry.path, "spec.md")
              if not os.path.exists(spec_file):
                  violations.append(f"ERRO: {entry.name}/ não tem spec.md")
              else:
                  content = open(spec_file).read()
                  if "alwaysApply:" not in content:
                      violations.append(f"AVISO: {spec_file} sem frontmatter")
          if violations:
              print("\n".join(violations))
              sys.exit(1)
          print("Conformidade SDD: OK")
          EOF

      - name: Verificar frontmatter dos docs
        run: |
          python - << 'EOF'
          import os, sys
          required_fields = ["name:", "description:"]
          violations = []
          for root, dirs, files in os.walk("docs"):
              dirs[:] = [d for d in dirs if not d.startswith("_")]
              for f in files:
                  if not f.endswith(".md") or f.startswith("_"):
                      continue
                  path = os.path.join(root, f)
                  content = open(path).read()
                  if not content.startswith("---"):
                      violations.append(f"AVISO: {path} sem frontmatter")
                      continue
                  for field in required_fields:
                      if field not in content[:500]:
                          violations.append(f"AVISO: {path} faltando {field}")
          if violations:
              print("\n".join(violations))
          else:
              print("Frontmatter: OK")
          EOF
